<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESG 認證 - 盈創新經濟</title>
    <style>
        :root {
            --earth-base: #4a3728;
            --gold-matte: #b18c5e;
            --gold-light: #e6d5b8;
            --dawn-blue: #e0f2f1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* 修正：允許在小螢幕垂直捲動，避免切到內容 */
            overflow-y: auto;
            padding: 20px 0;
        }

        /* 認證卡容器 */
        .card-container {
            width: 92vw;
            /* 修正：高度改為自動適應內容，避免溢出 */
            height: auto;
            min-height: 85vh; 
            max-width: 400px;
            background: linear-gradient(135deg, #634d3a 0%, #a67c52 50%, #4a3728 100%);
            border-radius: 24px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            /* 修正：微調內邊距 */
            padding: 40px 25px;
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.1s ease-out;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2;
        }

        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-symbol {
            width: 36px;
            height: 36px;
            border: 2px solid var(--gold-light);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .logo-square { width: 16px; height: 16px; border: 2px solid var(--gold-light); }
        .logo-text { font-size: 13px; font-weight: 800; letter-spacing: 1px; color: var(--gold-light); }

        .main-title {
            text-align: center;
            font-size: 18px;
            /* 修正：間距縮小 */
            margin-top: 35px;
            margin-bottom: 35px;
            font-weight: 300;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.9);
            z-index: 2;
        }

        .totem-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            cursor: pointer;
            /* 修正：增加圖騰區塊高度 */
            min-height: 220px;
        }

        .star-glow {
            position: absolute;
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, rgba(230,213,184,0.3) 0%, transparent 70%);
            animation: breatheGlow 5s infinite ease-in-out;
        }

        .hexagram {
            width: 180px;
            height: 180px;
            fill: none;
            stroke: var(--gold-light);
            stroke-width: 1;
            opacity: 0.8;
            filter: drop-shadow(0 0 5px var(--gold-light));
            animation: rotateStar 25s infinite linear, pulseStar 5s infinite ease-in-out;
        }

        .data-label {
            position: absolute;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 11px;
            border: 0.5px solid rgba(255,255,255,0.2);
            color: var(--gold-light);
            opacity: 0;
            visibility: hidden;
            transform: translate(0, 0) scale(0);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }
        
        .show-labels .data-label { opacity: 1; visibility: visible; }
        .show-labels .label-1 { transform: translate(-80px, -40px) scale(1); }
        .show-labels .label-2 { transform: translate(80px, -40px) scale(1); }
        /* 修正：數據化能效提升位置 */
        .show-labels .label-3 { transform: translate(0, 110px) scale(1); }

        .footer {
            text-align: center;
            z-index: 2;
            /* 修正：與圖騰的間距縮小 */
            margin-top: 40px;
        }

        .cert-text {
            font-size: 13px;
            line-height: 1.8;
            color: rgba(255,255,255,0.8);
            margin-bottom: 25px;
        }

        .company-name {
            display: inline-block;
            padding: 5px 0px;
            color: var(--gold-light);
            font-weight: bold;
        }

        .badges {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }
        .badge {
            width: 55px;
            height: 55px;
            border: 1px solid var(--gold-light);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            font-weight: bold;
        }
        .esg-badge { background: rgba(255,255,255,0.05); }

        .partner-btn {
            display: inline-block;
            font-size: 11px;
            color: var(--gold-light);
            text-decoration: none;
            /* 修正：按鈕距離徽章近一點 */
            margin-top: 20px;
            letter-spacing: 2px;
            padding: 5px 10px;
            background: transparent;
            opacity: 0.6;
            transition: all 0.3s ease;
        }

        @keyframes breatheGlow {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.1); opacity: 0.4; }
        }
        @keyframes rotateStar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulseStar {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 5px var(--gold-light)); }
            50% { transform: scale(1.03); filter: drop-shadow(0 0 8px var(--gold-light)); }
        }

        .shimmer {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, transparent 45%, rgba(255,255,255,0.1) 50%, transparent 55%);
            background-size: 200% 200%;
            animation: shimmerMove 6s infinite linear;
            pointer-events: none;
            border-radius: 24px;
        }
        @keyframes shimmerMove {
            0% { background-position: -200% -200%; }
            100% { background-position: 200% 200%; }
        }
    </style>
</head>
<body>

<div class="card-container" id="card">
    <div class="shimmer"></div>
    
    <div class="header">
        <div class="logo-area">
            <div class="logo-symbol"><div class="logo-square"></div></div>
            <div class="logo-text">DAWN LOOP<br><span style="font-size: 8px; font-weight: 300; opacity: 0.8;">黎明循環所</span></div>
        </div>
        <div style="font-size: 10px; opacity: 0.6; text-align: right;">減碳行動<br>你我有責</div>
    </div>

    <h2 class="main-title">盈創新經濟股份有限公司<br>ESG 減碳認證卡</h2>

    <div class="totem-area show-labels" id="totemArea">
        <div class="star-glow"></div>
        <svg class="hexagram" viewBox="0 0 100 100">
            <polygon points="50,5 90,75 10,75" />
            <polygon points="50,95 90,25 10,25" />
            <circle cx="50" cy="50" r="2" fill="white" />
        </svg>
        <div class="data-label label-1">減碳額度</div>
        <div class="data-label label-2">永續影響力</div>
        <div class="data-label label-3">數據化能效提升</div>
    </div>

    <div class="footer">
        <p class="cert-text">
            此卡認證 <span class="company-name"><br>盈創新經濟股份有限公司</span><br> 於 2026 年採購永續禮盒<br>
            落實友善環境，實踐企業社會責任
        </p>
        
        <div class="badges">
            <div class="badge">2026<br><span style="font-size: 7px; opacity: 0.7;">ISSUED</span></div>
            <div class="badge esg-badge">
                <span style="font-size: 12px; color: var(--gold-light);">ESG</span>
                <span style="font-size: 6px; opacity: 0.8;">CERTIFIED</span>
            </div>
        </div>
        
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSe30FeEbBi2PwQoI91xxg_NLfezE9lnDHImLm4WLhOHRvFyTw/viewform" target="_blank" class="partner-btn">
            成為倡議夥伴
        </a>
    </div>
</div>

<script>
    const card = document.getElementById('card');
    const totemArea = document.getElementById('totemArea');

    // 初始狀態隱藏標籤
    window.addEventListener('load', () => {
        totemArea.classList.remove('show-labels');
    });

    totemArea.addEventListener('click', () => {
        totemArea.classList.toggle('show-labels');
    });

    document.addEventListener('mousemove', (e) => {
        let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
        let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
        card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });

    card.addEventListener('touchmove', (e) => {
        let touch = e.touches[0];
        let xAxis = (window.innerWidth / 2 - touch.pageX) / 20;
        let yAxis = (window.innerHeight / 2 - touch.pageY) / 20;
        card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });
</script>

</body>
</html>

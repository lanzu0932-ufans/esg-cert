<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESG 認證 - 盈創新經濟</title>
    <style>
        :root {
            --earth-base: #4a3728; /* 深土色：基石 */
            --gold-matte: #b18c5e; /* 霧面金：庚金 */
            --gold-light: #e6d5b8; /* 亮金：財氣 */
            --dawn-blue: #e0f2f1; /* 曙光冷色：水能量 */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 認證卡容器 */
        .card-container {
            width: 90vw;
            height: 160vw;
            max-width: 400px;
            max-height: 700px;
            background: linear-gradient(135deg, #634d3a 0%, #a67c52 50%, #4a3728 100%);
            border-radius: 24px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            /* 1. 增加卡片內版面上下留白 */
            padding: 50px 30px;
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.1s ease-out;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
        }

        /* 頂部 Logo 與標題 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2;
        }

        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-symbol {
            width: 40px;
            height: 40px;
            border: 2px solid var(--gold-light);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .logo-square {
            width: 18px;
            height: 18px;
            border: 2px solid var(--gold-light);
        }
        .logo-text { font-size: 14px; font-weight: 800; letter-spacing: 1px; color: var(--gold-light); }

        .main-title {
            text-align: center;
            font-size: 18px;
            /* 2. 增加標題與圖騰區的留白 */
            margin-top: 50px;
            margin-bottom: 50px;
            font-weight: 300;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.9);
            z-index: 2;
        }

        /* 中央數據圖騰與互動區 */
        .totem-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            cursor: pointer; /* 點擊互動提示 */
        }

        /* 3. 讓核心產生酷炫呼吸感的動畫 */
        .star-glow {
            position: absolute;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(230,213,184,0.3) 0%, transparent 70%);
            animation: breatheGlow 5s infinite ease-in-out; /* 呼吸動畫，較長且平緩 */
        }

        /* 4. 六芒星增加脈動呼吸感 */
        .hexagram {
            width: 200px;
            height: 200px;
            fill: none;
            stroke: var(--gold-light);
            stroke-width: 1;
            opacity: 0.8;
            filter: drop-shadow(0 0 5px var(--gold-light));
            animation: 
                rotateStar 25s infinite linear, /* 原有旋轉 */
                pulseStar 5s infinite ease-in-out; /* 增加呼吸脈動 */
        }

        /* 5. 數據標籤初始狀態：隱藏且置中縮小，增加彈出動畫 */
        .data-label {
            position: absolute;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 11px;
            border: 0.5px solid rgba(255,255,255,0.2);
            color: var(--gold-light);
            /* 互動前：隱藏並置中 */
            opacity: 0;
            visibility: hidden;
            transform: translate(0, 0) scale(0); 
            transform-origin: center center;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* 彈簧效果 */
            z-index: 10;
        }
        
        /* 6. 點擊核心後跑出來的動畫位置 */
        .show-labels .data-label {
            opacity: 1;
            visibility: visible;
        }
        .show-labels .label-1 { transform: translate(-80px, calc(0px - 20%)) scale(1); }
        .show-labels .label-2 { transform: translate(80px, calc(0px - 20%)) scale(1); }
        .show-labels .label-3 { transform: translate(0, calc(200px / 2 + 15%)) scale(1); }

        /* 認證內文 */
        .footer {
            text-align: center;
            z-index: 2;
            /* 7. 增加內文與圖騰區留白 */
            margin-top: 50px;
        }

        .cert-text {
            font-size: 13px;
            line-height: 1.8;
            color: rgba(255,255,255,0.8);
            margin-bottom: 30px;
        }

        .company-name {
            display: inline-block;
            padding: 5px 0px;
            background: transparent;
            color: var(--gold-light);
            font-weight: bold;
            margin: 0 5px;
        }

        .badges {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }
        .badge {
            width: 55px;
            height: 55px;
            border: 1px solid var(--gold-light);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            font-weight: bold;
        }
        .esg-badge { background: rgba(255,255,255,0.05); }

        /* 8. 去除外框與底色，改為乾淨連結 */
        .partner-btn {
            display: inline-block;
            font-size: 11px;
            color: var(--gold-light);
            text-decoration: none;
            margin-top: 25px;
            letter-spacing: 2px;
            /* 純文字樣式，移除外框、底色、內間距 */
            padding: 5px 0px; 
            border: none; 
            background: transparent; 
            opacity: 0.5;
            transition: all 0.3s ease;
        }
        .partner-btn:active {
            opacity: 0.8;
            transform: scale(0.98);
        }

        /* 新增動畫定義 */
        @keyframes breatheGlow {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.1); opacity: 0.4; }
        }
        @keyframes rotateStar {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes pulseStar {
            0%, 100% { transform: rotate(var(--current-rotation, 0deg)) scale(1); filter: drop-shadow(0 0 5px var(--gold-light)); }
            50% { transform: rotate(var(--current-rotation, 0deg)) scale(1.03); filter: drop-shadow(0 0 8px var(--gold-light)); }
        }

        .shimmer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, transparent 45%, rgba(255,255,255,0.1) 50%, transparent 55%);
            background-size: 200% 200%;
            animation: shimmerMove 6s infinite linear;
            pointer-events: none;
            border-radius: 24px;
        }
        @keyframes shimmerMove {
            0% { background-position: -200% -200%; }
            100% { background-position: 200% 200%; }
        }
    </style>
</head>
<body>

<div class="card-container" id="card">
    <div class="shimmer"></div>
    
    <div class="header">
        <div class="logo-area">
            <div class="logo-symbol">
                <div class="logo-square"></div>
            </div>
            <div class="logo-text">DAWN LOOP<br><span style="font-size: 8px; font-weight: 300; opacity: 0.8;">黎明循環所</span></div>
        </div>
        <div style="font-size: 10px; opacity: 0.6; text-align: right;">減碳行動<br>你我有責</div>
    </div>

    <h2 class="main-title">盈創新經濟股份有限公司<br>ESG 減碳認證卡</h2>

    <div class="totem-area show-labels" id="totemArea">
        <div class="star-glow"></div>
        <svg class="hexagram" viewBox="0 0 100 100">
            <polygon points="50,5 90,75 10,75" />
            <polygon points="50,95 90,25 10,25" />
            <circle cx="50" cy="50" r="2" fill="white" />
        </svg>
        <div class="data-label label-1">減碳額度</div>
        <div class="data-label label-2">永續影響力</div>
        <div class="data-label label-3">數據化能效提升</div>
    </div>

    <div class="footer">
        <p class="cert-text">
            此卡認證 <span class="company-name"><br>盈創新經濟股份有限公司</span><br> 於 2026 年採購永續禮盒<br>
            落實友善環境，實踐企業社會責任<br>
        </p>
        
        <div class="badges">
            <div class="badge">2026<br><span style="font-size: 7px; opacity: 0.7;">ISSUED</span></div>
            <div class="badge esg-badge">
                <span style="font-size: 12px; color: var(--gold-light);">ESG</span>
                <span style="font-size: 6px; opacity: 0.8;">CERTIFIED</span>
            </div>
        </div>
        
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSe30FeEbBi2PwQoI91xxg_NLfezE9lnDHImLm4WLhOHRvFyTw/viewform" target="_blank" class="partner-btn">
            成為倡議夥伴
        </a>
    </div>
</div>

<script>
    const card = document.getElementById('card');
    const totemArea = document.getElementById('totemArea');
    const hexagram = document.querySelector('.hexagram');

    // 初始化狀態：預設隱藏數據標籤（移除 show-labels 類別）
    window.addEventListener('load', () => {
        totemArea.classList.remove('show-labels');
    });

    // 9. 新增點擊互動：點擊核心區域切換標籤跑出來/隱藏
    totemArea.addEventListener('click', () => {
        totemArea.classList.toggle('show-labels');
    });

    // 原有手機陀螺儀互動
    document.addEventListener('mousemove', (e) => {
        let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
        let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
        card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });

    card.addEventListener('touchmove', (e) => {
        let touch = e.touches[0];
        let xAxis = (window.innerWidth / 2 - touch.pageX) / 20;
        let yAxis = (window.innerHeight / 2 - touch.pageY) / 20;
        card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });
</script>

</body>
</html>

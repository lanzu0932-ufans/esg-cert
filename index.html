<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESG 減碳認證 - DAWN LOOP</title>
    <style>
        :root {
            --earth-base: #4a3728; /* 深土色：基石 */
            --gold-matte: #b18c5e; /* 霧面金：庚金 */
            --gold-light: #e6d5b8; /* 亮金：財氣 */
            --dawn-blue: #e0f2f1; /* 曙光冷色：水能量 */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 認證卡容器 */
        .card-container {
            width: 90vw;
            height: 160vw; /* 適配手機長寬比 */
            max-width: 400px;
            max-height: 700px;
            background: linear-gradient(135deg, #634d3a 0%, #a67c52 50%, #4a3728 100%);
            border-radius: 24px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            padding: 30px;
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.1s ease-out;
            /* 模擬再生紙質感 */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
        }

        /* 頂部 Logo 與標題 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2;
        }

        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-symbol {
            width: 40px;
            height: 40px;
            border: 2px solid var(--gold-light);
            border-radius: 50%; /* 圓形：金 */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .logo-square {
            width: 18px;
            height: 18px;
            border: 2px solid var(--gold-light); /* 方形：土 */
        }
        .logo-text { font-size: 14px; font-weight: 800; letter-spacing: 1px; color: var(--gold-light); }

        .main-title {
            text-align: center;
            font-size: 18px;
            margin-top: 40px;
            font-weight: 300;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.9);
            z-index: 2;
        }

        /* 中央數據圖騰 */
        .totem-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .star-glow {
            position: absolute;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(230,213,184,0.3) 0%, transparent 70%);
            animation: pulse 4s infinite ease-in-out;
        }

        /* 六芒星 SVG */
        .hexagram {
            width: 200px;
            height: 200px;
            fill: none;
            stroke: var(--gold-light);
            stroke-width: 1;
            opacity: 0.8;
            filter: drop-shadow(0 0 5px var(--gold-light));
            animation: rotate 20s infinite linear;
        }

        /* 數據標籤 */
        .data-label {
            position: absolute;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 11px;
            border: 0.5px solid rgba(255,255,255,0.2);
            color: var(--gold-light);
        }
        .label-1 { top: 20%; left: -10px; }
        .label-2 { top: 20%; right: -10px; }
        /* 1. 調整：向下移動 30pt */
        .label-3 { bottom: calc(15% - 30pt); }

        /* 認證內文 */
        .footer {
            text-align: center;
            z-index: 2;
        }

        .cert-text {
            font-size: 13px;
            line-height: 1.8;
            color: rgba(255,255,255,0.8);
            margin-bottom: 30px;
        }

        /* 2. 調整：去掉底色，改為金色加粗 */
        .company-name {
            display: inline-block;
            padding: 5px 0px;
            background: transparent;
            color: var(--gold-light);
            font-weight: bold;
            margin: 0 5px;
        }

        /* 徽章組 */
        .badges {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }
        .badge {
            width: 55px;
            height: 55px;
            border: 1px solid var(--gold-light);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            font-weight: bold;
        }
        .esg-badge { background: rgba(255,255,255,0.05); }

        /* 動畫 */
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.5; }
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 閃光層 */
        .shimmer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, transparent 45%, rgba(255,255,255,0.1) 50%, transparent 55%);
            background-size: 200% 200%;
            animation: shimmerMove 6s infinite linear;
            pointer-events: none;
            border-radius: 24px;
        }
        @keyframes shimmerMove {
            0% { background-position: -200% -200%; }
            100% { background-position: 200% 200%; }
        }
    </style>
</head>
<body>

<div class="card-container" id="card">
    <div class="shimmer"></div>
    
    <div class="header">
        <div class="logo-area">
            <div class="logo-symbol">
                <div class="logo-square"></div>
            </div>
            <div class="logo-text">DAWN LOOP<br><span style="font-size: 8px; font-weight: 300; opacity: 0.8;">黎明循環所</span></div>
        </div>
        <div style="font-size: 10px; opacity: 0.6; text-align: right;">減碳行動<br>你我有責</div>
    </div>

    <h2 class="main-title">盈創新經濟股份有限公司<br>ESG 減碳認證卡</h2>

    <div class="totem-area">
        <div class="star-glow"></div>
        <svg class="hexagram" viewBox="0 0 100 100">
            <polygon points="50,5 90,75 10,75" />
            <polygon points="50,95 90,25 10,25" />
            <circle cx="50" cy="50" r="2" fill="white" />
        </svg>
        <div class="data-label label-1">減碳額度</div>
        <div class="data-label label-2">永續影響力</div>
        <div class="data-label label-3">數據化能效提升</div>
    </div>

    <div class="footer">
        <p class="cert-text">
            此卡認證 <span class="company-name"><br>盈創新經濟股份有限公司</span><br> 於 2026 年採購永續禮盒<br>
            落實友善環境，實踐企業社會責任<br>
                  </p>
        
        <div class="badges">
            <div class="badge">2026<br><span style="font-size: 7px; opacity: 0.7;">ISSUED</span></div>
            <div class="badge esg-badge">
                <span style="font-size: 12px; color: var(--gold-light);">ESG</span>
                <span style="font-size: 6px; opacity: 0.8;">CERTIFIED</span>
            </div>
        </div>
        
        <p style="font-size: 9px; opacity: 0.4; margin-top: 20px; letter-spacing: 1px;">
            成為倡議夥伴
        </p>
    </div>
</div>

<script>
    // 增加手機陀螺儀互動感
    const card = document.getElementById('card');
    
    document.addEventListener('mousemove', (e) => {
        let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
        let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
        card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });

    // 針對手機端觸摸時的微動
    card.addEventListener('touchmove', (e) => {
        let touch = e.touches[0];
        let xAxis = (window.innerWidth / 2 - touch.pageX) / 20;
        let yAxis = (window.innerHeight / 2 - touch.pageY) / 20;
        card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });
</script>

</body>
</html>
